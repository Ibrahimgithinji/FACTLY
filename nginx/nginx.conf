upstream django {
    server backend:8000;
}

server {
    listen 80;
    server_name factly.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name factly.app;

    client_max_body_size 10M;

    # SSL (configure with real certs in production)
    ssl_certificate /etc/ssl/certs/factly.crt;
    ssl_certificate_key /etc/ssl/private/factly.key;

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # API proxy
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Admin
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health checks
    location /health/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
    }
}
